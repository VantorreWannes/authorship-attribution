[project]
name = "authorship-attribution"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [{ name = "Wannes Vantorre", email = "vantorrewannes@gmail.com" }]
requires-python = ">=3.12"
dependencies = [
    "nltk>=3.9.1",
    "scikit-learn>=1.6.1",
    "torch>=2.7.0",
    "torchaudio>=2.7.0",
    "torchvision>=0.22.0",
]

[project.scripts]
authorship-attribution = "authorship_attribution:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = ["pytest>=8.3.5"]

[tool.uv]
package = true
